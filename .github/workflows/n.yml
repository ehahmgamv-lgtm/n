name: Fast VPN

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  vpn-node:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: VPN
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          sudo pkill -SIGSTOP Runner.Worker && echo 'net.ipv4.ip_forward = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf && echo 'net.ipv6.conf.all.forwarding = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf && sudo sysctl -p /etc/sysctl.d/99-tailscale.conf && curl -fsSL https://tailscale.com/install.sh | sh && sudo tailscale up --authkey=${TAILSCALE_AUTHKEY} --advertise-exit-node --hostname=github-fast-vpn && echo "VPN запущен! Сервер готов к принятию трафика." && mpstat -P ALL 2 & sleep infinity
